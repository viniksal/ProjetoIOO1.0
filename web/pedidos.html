<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Gráfica</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/style.css">
        <style>
        /*MODAL*/
            .modal-pedido{
                width: 850px;
                max-width: 95%;
                background: #171717;
                color: white;
                border: 1px solid #2b2b2b;
                border-radius: 18px;
                padding: 0;
                box-shadow: 0 20px 60px rgba(0,0,0,.6);
                overflow: hidden;
            }

            .modal-pedido::backdrop{
                background: rgba(0,0,0,.75);
                backdrop-filter: blur(4px);
            }

/* CABEÇALHO */

            .modal-topo{
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 25px 30px;
                border-bottom: 1px solid #2a2a2a;
            }

            .modal-topo h2{
                margin: 0;
                color: #ff6b00;
                font-weight: 600;
            }

            .btn-x{
                background: transparent;
                border: none;
                color: #999;
                font-size: 20px;
            }

            .btn-x:hover{
                color: white;
            }

/* CORPO */

            .modal-pedido form{
                padding: 30px;
            }

            .modal-pedido label{
                    color: #bcbcbc;
                margin-bottom: 8px;
            }

/* INPUTS */
            .input-dark{
                background: #0f0f0f !important;
                border: 1px solid #303030 !important;
                color: white !important;
                height: 50px;
            }

            .input-dark:focus{
                background: #0f0f0f !important;
                border-color: #ff6b00 !important;
                box-shadow: 0 0 0 .2rem rgba(255,107,0,.15) !important;
            }

            textarea.input-dark{
                height: auto;
            }

/* FOOTER */
            .modal-footer-custom{
                display: flex;
                justify-content: flex-end;
                gap: 12px;
                margin-top: 30px;
            }

/* BOTÃO SALVAR */
            .btn-salvar{
                background: #ff6b00;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 10px;
                transition: .3s;
            }

            .btn-salvar:hover{
                background: #ff7f1f;
                color: white;
                transform: translateY(-2px);
                box-shadow: 0 0 15px rgba(255,107,0,.25);
            }   
        </style>
    </head>
   
    <body>
        <div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo-area">
            <h2>GRÁFICA</h2>
            <p>Sistema Inteligente</p>
        </div>

        <nav class="nav flex-column menu">
            <!--📊 📄 👥 🖨-->
            <a class="nav-link" href="home.html">
                Dashboard
            </a>

            <a class="nav-link active" href="pedidos.html">
                Pedidos
            </a>

            <a class="nav-link" href="#">
                Clientes
            </a>

            <a class="nav-link" href="#">
               Produtos
            </a>

        </nav>

        <div class="user-box">
            <small>Usuário</small>
            <h6>Carlos Lima</h6>
            <span>Atendente</span>
        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">
        <!-- HEADER -->
        <div class="topbar">

            <h1>Pedidos</h1>

            <button class="btn btn-lg btn-novo-pedido" id="abrirModal">+ Novo Pedido</button>

            <dialog id="modalAdicionar" class="modal-pedido">
                <div class="modal-topo">
                    <h2>Novo Pedido</h2>
                        <button class="btn-x" id="fecharModal">
                            <i class="bi bi-x-lg"></i>
                        </button>
                </div>

                <form method="dialog">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Cliente</label>
                            <input type="text" class="form-control input-dark">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Funcionário</label>
                            <input type="text" class="form-control input-dark">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Data de Entrega</label>
                            <input type="date" class="form-control input-dark">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Valor Total</label>
                            <input type="number" step="0.01" class="form-control input-dark">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Descrição</label>
                            <textarea rows="4" class="form-control input-dark"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Status</label>

                            <select class="form-select input-dark">
                                <option>Orçamento</option>
                                <option>Em Produção</option>
                                <option>Pronto</option>
                                <option>Entregue</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="modal-footer-custom">
                        <button type="button" class="btn btn-outline-secondary" id="cancelarModal"> Cancelar </button>
                        <button type="submit" class="btn btn-salvar">Salvar Pedido</button>
                    </div>
                </form>
            </dialog>
        </div> <!--fecha a div topbar-->
    

        
            </main>

        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
            const modal = document.getElementById("modalAdicionar");

            document.getElementById("abrirModal")
            .addEventListener("click", () => {
                modal.showModal();
            });

            document.getElementById("fecharModal")
            .addEventListener("click", () => {
                modal.close();
            });

            document.getElementById("cancelarModal")
            .addEventListener("click", () => {
                modal.close();
                    });
        </script>
    </body>
</html>
